name: mac

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/mac.yml'

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - name: Checkout (recursive)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch SDKs (VST2 + VST3)
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/R-Tur/VST_SDK_2.4.git "$HOME/SDKs/vstsdk2.4"
          git clone --depth 1 --branch vstsdk368_08_11_2017_build_121 --recurse-submodules --shallow-submodules \
            https://github.com/steinbergmedia/vst3sdk.git "$GITHUB_WORKSPACE/../SDKs/vstsdk3"

      - name: Fetch CoreAudio Utility Classes (AU base classes Apple removed from modern Xcode)
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/g-roma/CoreAudioUtilityClasses.git "$GITHUB_WORKSPACE/../CAUtil"
          AUDIR="$(find "$GITHUB_WORKSPACE/../CAUtil" -type d -name AudioUnits | head -n1)"
          CAROOT="$(dirname "$AUDIR")"
          echo "CoreAudio root: $CAROOT"
          ls "$CAROOT"
          # the pbxproj references AU sources at DEVELOPER_DIR/Extras/CoreAudio/AudioUnits/...
          DEV="$(xcode-select -p)"
          sudo mkdir -p "$DEV/Extras"
          sudo ln -sfn "$CAROOT" "$DEV/Extras/CoreAudio"
          ls -la "$DEV/Extras/CoreAudio"

      - name: List schemes/targets
        run: |
          cd Builds/MacOSX
          xcodebuild -list -project Signalizer.xcodeproj || true

      - name: Build (AU + VST3)
        run: |
          set -uxo pipefail
          cd Builds/MacOSX
          xcodebuild \
            -project Signalizer.xcodeproj \
            -scheme Signalizer \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/build_out" \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            ARCHS=x86_64 ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee "$GITHUB_WORKSPACE/build.log" | tail -n 120
          echo "xcodebuild exit: ${PIPESTATUS[0]}"

      - name: Show build output + errors
        if: always()
        run: |
          echo "=== build_out ==="
          ls -laR "$GITHUB_WORKSPACE/build_out" 2>/dev/null || echo "no build_out"
          echo "=== errors ==="
          grep -nE "error:|fatal error|cannot find|No such file|not found" "$GITHUB_WORKSPACE/build.log" | tail -n 70 || true

      - name: Package both formats (AU .component + VST3 .vst3) into ONE installer
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/build_out"
          BIN="$(find Signalizer.component/Contents/MacOS -type f | head -n1)"
          echo "binary: $BIN"
          echo "=== exported entry points (AU factory + VST3 factory expected) ==="
          nm -gU "$BIN" | grep -iE "AudioComponent|PluginFactory|Entry|Factory" || true

          # the one built binary exports BOTH the AU factory and the VST3 factory,
          # so we ship both formats from it in a single installer.
          rm -rf pkg_root
          mkdir -p "pkg_root/Library/Audio/Plug-Ins/Components" "pkg_root/Library/Audio/Plug-Ins/VST3"

          # AU: the .component as built (its Info.plist holds the AudioComponents entry)
          AU="pkg_root/Library/Audio/Plug-Ins/Components/ETM Signalizer.component"
          cp -R Signalizer.component "$AU"

          # VST3: repackage the same binary as a .vst3 bundle
          VST3="pkg_root/Library/Audio/Plug-Ins/VST3/ETM Signalizer.vst3"
          mkdir -p "$VST3/Contents/MacOS"
          cp "$BIN" "$VST3/Contents/MacOS/Signalizer"
          cp "$GITHUB_WORKSPACE/Builds/MacOSX/vst3_Info.plist" "$VST3/Contents/Info.plist"
          printf 'BNDL????' > "$VST3/Contents/PkgInfo"
          if [ -d Signalizer.component/Contents/Resources ]; then
            cp -R Signalizer.component/Contents/Resources "$AU/Contents/Resources" 2>/dev/null || true
            cp -R Signalizer.component/Contents/Resources "$VST3/Contents/Resources"
          fi

          # ad-hoc sign both
          codesign --force --deep --sign - "$AU"   || echo "AU codesign failed (non-fatal)"
          codesign --force --deep --sign - "$VST3" || echo "VST3 codesign failed (non-fatal)"
          ls -laR pkg_root | head -n 40

      - name: Build .pkg installer (AU + VST3)
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/build_out"
          pkgbuild --root pkg_root \
            --install-location "/" \
            --identifier com.etm.signalizer.macos \
            --version 0.4.3 \
            "ETM-Signalizer-macOS-Installer.pkg"
          ls -la *.pkg

      - name: Upload macOS installer (AU + VST3)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ETM-Signalizer-macOS-Installer
          path: ${{ github.workspace }}/build_out/*.pkg
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mac-au-build-log
          path: ${{ github.workspace }}/build.log
          if-no-files-found: warn
